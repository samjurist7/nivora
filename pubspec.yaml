name: nivora
description: Nivora - cross-platform Bluetooth controller (Android, iOS, Mobile Web)
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^1.1.0
  provider: ^6.0.5
  flutter_blue_plus: ^2.3.3
  shared_preferences: ^2.1.1
  network_info_plus: ^7.0.0
  permission_handler: ^12.0.1
  web_socket_channel: ^2.4.0
  google_fonts: ^6.1.0
  image_picker: ^1.2.2
  image_cropper: ^10.0.0+1
  custom_image_crop: ^0.1.1
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # 图片资源
  assets:
    - assets/images/
